<html lang="el">
<head>
  <meta charset="utf-8">

  <title>Greek Verbs Quiz</title>
  <style>:root{color-scheme:light;--bg:#eef5f8;--panel:#fffdfa;--text:#18263a;--muted:#657184;--line:#cbd9e6;--accent:#0d5eaf;--accent2:#b45d37;--olive:#566b3f;--gold:#c69b3a;--good:#1f7a45;--bad:#b7332f;--shadow:0 12px 34px rgba(13,94,175,.11)}*{box-sizing:border-box}body{margin:0;background-color:var(--bg);background-image:linear-gradient(rgba(255,255,255,.7),rgba(255,255,255,.7)),repeating-linear-gradient(0deg,rgba(13,94,175,.08) 0 1px,transparent 1px 34px),repeating-linear-gradient(90deg,rgba(13,94,175,.055) 0 1px,transparent 1px 34px);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.4}button,input,select{font:inherit}button{cursor:pointer}.shell{width:min(1120px,calc(100% - 32px));margin:24px auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 0;border-bottom:3px double rgba(13,94,175,.28)}h1,h2,h3,p{margin:0}h1{font-size:clamp(1.7rem,2vw,2.25rem);color:var(--accent);font-weight:850}h1:after{content:"";display:inline-block;width:44px;height:12px;margin-left:12px;background:repeating-linear-gradient(90deg,var(--gold) 0 10px,transparent 10px 15px);vertical-align:.08em}h2{margin-bottom:14px;font-size:1.35rem;color:#173f73}h3{margin:22px 0 8px;font-size:1rem;color:var(--accent)}.muted,.topbar p{color:var(--muted)}.score{min-width:72px;padding:8px 12px;border:1px solid rgba(13,94,175,.28);border-radius:8px;background:#fff;text-align:center;font-weight:800;color:var(--accent);box-shadow:var(--shadow)}.layout{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start}.menu,.panel{background:linear-gradient(180deg,#fff 0%,var(--panel) 100%);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.menu{display:grid;gap:8px;padding:10px;position:sticky;top:16px;border-top:5px solid var(--accent)}.menu button,.primary,.secondary{border:1px solid transparent;border-radius:7px}.menu button{min-height:44px;padding:10px 12px;background:linear-gradient(180deg,#fff 0%,#eef7ff 100%);color:#12395f;text-align:left;border-color:#bad4eb;border-bottom-color:#8fb8dc;box-shadow:0 2px 0 rgba(13,94,175,.16),0 7px 16px rgba(13,94,175,.07);font-weight:750}.menu button:hover,.menu button.active{background:linear-gradient(180deg,#0d5eaf 0%,#0a4d91 100%);border-color:#073b78;color:#fff;box-shadow:0 2px 0 rgba(7,59,120,.35),0 9px 18px rgba(13,94,175,.18);transform:translateY(-1px)}.panel{min-height:520px;padding:22px;border-top:5px solid var(--gold)}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}.primary,.secondary{min-height:40px;padding:8px 14px}.primary{background:var(--accent);color:#fff}.primary:hover{background:#0a4d91}.secondary{background:#fff7ec;color:#5e331f;border-color:#e5c9a5}.secondary:hover{background:#ffefd8}.question-meta{display:grid;gap:8px;margin:16px 0;padding:14px;border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:8px;background:#fbfdff}.question-meta strong{color:#173f73}.answer-row{display:flex;gap:10px}.answer-row input,.number-row input{width:100%;min-height:44px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:#fff}.answer-row input:focus,.number-row input:focus{outline:3px solid rgba(13,94,175,.18);border-color:var(--accent)}.feedback{margin-top:14px;font-weight:700}.feedback.good{color:var(--good)}.feedback.bad{color:var(--bad)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}.check{display:flex;align-items:center;gap:8px;min-height:40px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:#fbfdff}.check:hover{border-color:#98bddc;background:#eef7ff}.check input{width:18px;height:18px;accent-color:var(--accent)}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:#426282;font-weight:800;background:#f4f9fd}.right{text-align:right}.pill-list{display:flex;flex-wrap:wrap;gap:6px}.pill{padding:3px 7px;border-radius:999px;background:#e7f2fb;color:#0a4d91;border:1px solid #c5dff3;font-size:.9rem}.empty{padding:18px;border:1px dashed #9fb8cf;border-radius:8px;color:var(--muted);background:#fbfdff}.verb-block{margin-top:20px;padding-top:4px}.verb-name{color:var(--accent2);font-size:1.15rem;font-weight:850}.verb-name:before{content:"";display:inline-block;width:18px;height:18px;margin-right:8px;border:3px solid var(--accent);border-left-color:var(--gold);vertical-align:-3px}@media(max-width:760px){.shell{width:min(100% - 20px,1120px);margin-top:10px}.topbar,.answer-row{align-items:stretch;flex-direction:column}.layout{grid-template-columns:1fr}.menu{position:static}h1:after{display:block;margin:8px 0 0}}</style>

async function unpackQuizData(){
  if (!("DecompressionStream" in window)) {
    throw new Error("Αυτός ο browser δεν υποστηρίζει την αποσυμπίεση αυτού του αρχείου. Χρησιμοποίησε το index.html.");
  }
  const bytes=Uint8Array.from(atob(PACKED_QUIZ_DATA),char=>char.charCodeAt(0));
  const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
  return JSON.parse(await new Response(stream).text());
}
(async()=>{const DATA=await unpackQuizData();const CATEGORIES=DATA.categories;const CATEGORY_LABELS=Object.fromEntries(CATEGORIES.map(c=>[c.key,c.label]));const QUESTIONS=DATA.questions;const STORAGE_CONFIG="GreekQuiz.quiz_config";const STORAGE_ATTEMPTS="GreekQuiz.attempts";const view=document.querySelector("#view");const summary=document.querySelector("#summary");const sessionScore=document.querySelector("#sessionScore");const menu=document.querySelector(".menu");let config=loadConfig();let quizRun=[];let quizIndex=0;let sessionCorrect=0;let answerLocked=false;const questionById=new Map(QUESTIONS.map(q=>[q.id,q]));const answerIndex=buildAnswerIndex();function escapeHtml(value){return String(value).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"})[c])}function normalizeAnswer(value){return String(value).trim().toLocaleLowerCase("el-GR").split(/\s+/).filter(Boolean).join(" ").normalize("NFC")}function categoryMatchAnswers(question){const answers=new Set(question.answers.map(normalizeAnswer));for(const answer of question.answers){const parts=normalizeAnswer(answer).split(" ").filter(Boolean);for(const particle of ["να","ας"]){if(parts[0]===particle)answers.add(parts.slice(1).join(" "));if(parts.length>=3&&parts[1]===particle)answers.add([parts[0],...parts.slice(2)].join(" "))}}return answers}function buildAnswerIndex(){const index=new Map();for(const q of QUESTIONS){for(const answer of categoryMatchAnswers(q)){const key=`${q.verb}\u0001${q.person_key}\u0001${answer}`;if(!index.has(key))index.set(key,new Set);index.get(key).add(q.category)}}return index}function matchingOtherCategories(question,answer){const key=`${question.verb}\u0001${question.person_key}\u0001${normalizeAnswer(answer)}`;return [...(answerIndex.get(key)||new Set)].filter(c=>c!==question.category).sort((a,b)=>CATEGORY_LABELS[a].localeCompare(CATEGORY_LABELS[b],"el"))}function loadConfig(){try{const data=JSON.parse(localStorage.getItem(STORAGE_CONFIG)||"{}");return validateConfig(data)}catch{return validateConfig({})}}function validateConfig(data){const allowedVerbs=new Set(DATA.verbs);const allowedCategories=new Set(CATEGORIES.map(c=>c.key));const count=Number.isInteger(data.question_count)&&data.question_count>=1?data.question_count:DATA.default_question_count;const verbs=Array.isArray(data.verbs)?data.verbs.filter(v=>allowedVerbs.has(v)):[];const categories=Array.isArray(data.categories)?data.categories.filter(c=>allowedCategories.has(c)):[];return{question_count:count,verbs:[...new Set(verbs)].sort((a,b)=>a.localeCompare(b,"el")),categories:[...new Set(categories)].sort((a,b)=>CATEGORY_LABELS[a].localeCompare(CATEGORY_LABELS[b],"el"))}}function saveConfig(next){config=validateConfig({...config,...next});localStorage.setItem(STORAGE_CONFIG,JSON.stringify(config));updateSummary()}function loadAttempts(){try{const rows=JSON.parse(localStorage.getItem(STORAGE_ATTEMPTS)||"[]");return Array.isArray(rows)?rows:[]}catch{return[]}}function saveAttempts(rows){localStorage.setItem(STORAGE_ATTEMPTS,JSON.stringify(rows))}function recordAttempt(question,answer,correct){const rows=loadAttempts();rows.push({attempted_at:new Date().toISOString(),verb:question.verb,category:question.category,person_key:question.person_key,expected:question.answers[0],answer,correct:correct?1:0});saveAttempts(rows)}function describeFilter(values,labels){if(!values.length)return"Όλα";return values.map(v=>labels?labels[v]||v:v).sort((a,b)=>a.localeCompare(b,"el")).join(", ")}function updateSummary(){summary.textContent=`Ερωτήσεις: ${config.question_count} | Κατηγορίες: ${describeFilter(config.categories,CATEGORY_LABELS)} | Ρήματα: ${describeFilter(config.verbs)}`}function setActive(name){document.querySelectorAll(".menu button").forEach(button=>button.classList.toggle("active",button.dataset.view===name))}function availableQuestions(verbs=config.verbs,categories=config.categories){return QUESTIONS.filter(q=>(!verbs.length||verbs.includes(q.verb))&&(!categories.length||categories.includes(q.category)))}function availableCategories(){return new Set(availableQuestions(config.verbs,[]).map(q=>q.category))}function availableVerbs(){return new Set(availableQuestions([],config.categories).map(q=>q.verb))}function sample(array,count){const take=n=>{const copy=[...array];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy.slice(0,n)};if(count<=array.length)return take(count);const selected=[];let remaining=count;while(remaining>=array.length){selected.push(...take(array.length));remaining-=array.length}if(remaining)selected.push(...take(remaining));return selected}function renderHome(){setActive("");view.innerHTML=`<h2>Τρέχουσες επιλογές</h2><table><tbody><tr><th>Ερωτήσεις</th><td>${config.question_count}</td></tr><tr><th>Κατηγορίες</th><td>${escapeHtml(describeFilter(config.categories,CATEGORY_LABELS))}</td></tr><tr><th>Ρήματα</th><td>${escapeHtml(describeFilter(config.verbs))}</td></tr></tbody></table>`}function startQuiz(){setActive("quiz");const filtered=availableQuestions();if(!filtered.length){view.innerHTML=`<div class="empty">Δεν υπάρχουν ερωτήσεις για τα επιλεγμένα ρήματα/κατηγορίες.</div>`;return}quizRun=sample(filtered,config.question_count);quizIndex=0;sessionCorrect=0;sessionScore.textContent=`0/${quizRun.length}`;renderQuestion()}function renderQuestion(){answerLocked=false;const question=quizRun[quizIndex];view.innerHTML=`<h2>Ερώτηση ${quizIndex+1}/${quizRun.length}</h2><div class="question-meta"><div><strong>Ρήμα:</strong> ${escapeHtml(question.verb)}</div><div><strong>Κατηγορία:</strong> ${escapeHtml(CATEGORY_LABELS[question.category])}</div><div><strong>Πρόσωπο:</strong> ${escapeHtml(question.pronoun)} <span class="muted">(${escapeHtml(question.person_label)})</span></div></div><form id="answerForm"><div class="answer-row"><input id="answer" autocomplete="off" autofocus placeholder="Η απάντησή σου"><button class="primary" type="submit">Έλεγχος</button></div></form><div id="feedback" class="feedback"></div>`;document.querySelector("#answer").focus();document.querySelector("#answerForm").addEventListener("submit",submitAnswer)}function submitAnswer(event){event.preventDefault();if(answerLocked)return;answerLocked=true;const question=quizRun[quizIndex];const answer=document.querySelector("#answer").value;const accepted=new Set(question.answers.map(normalizeAnswer));const correct=accepted.has(normalizeAnswer(answer));recordAttempt(question,answer,correct);if(correct)sessionCorrect++;sessionScore.textContent=`${sessionCorrect}/${quizRun.length}`;const feedback=document.querySelector("#feedback");const expected=question.answers.map(escapeHtml).join(" / ");const other=matchingOtherCategories(question,answer);const matched=other.length?`<p class="muted">Η απάντησή σου ταιριάζει με: ${other.map(c=>escapeHtml(CATEGORY_LABELS[c])).join(", ")}.</p>`:"";feedback.className=`feedback ${correct?"good":"bad"}`;feedback.innerHTML=correct?"Σωστά.":`Όχι ακριβώς. <span class="muted">Αναμενόμενο:</span> ${expected}${matched}`;document.querySelector("#answer").disabled=true;document.querySelector("#answerForm button").disabled=true;const actions=document.createElement("div");actions.className="actions";actions.innerHTML=quizIndex+1<quizRun.length?`<button class="primary">Επόμενη</button>`:`<button class="primary">Σκορ συνεδρίας</button>`;view.append(actions);const button=actions.querySelector("button");button.focus();button.addEventListener("click",()=>{if(quizIndex+1<quizRun.length){quizIndex++;renderQuestion()}else renderQuizDone()})}function renderQuizDone(){const percent=quizRun.length?((sessionCorrect/quizRun.length)*100).toFixed(1):"0.0";view.innerHTML=`<h2>Σκορ συνεδρίας</h2><p class="score">${sessionCorrect}/${quizRun.length} (${percent}%)</p><div class="actions"><button class="primary" id="again">Νέο κουίζ</button><button class="secondary" id="statsButton">Στατιστικά</button></div>`;document.querySelector("#again").addEventListener("click",startQuiz);document.querySelector("#statsButton").addEventListener("click",renderStats)}function renderSelection(kind){const isCategory=kind==="categories";setActive(kind);const available=isCategory?availableCategories():availableVerbs();const selected=new Set(isCategory?config.categories:config.verbs);const items=isCategory?CATEGORIES.filter(c=>available.has(c.key)):DATA.verbs.filter(v=>available.has(v)).map(v=>({key:v,label:v}));view.innerHTML=`<h2>${isCategory?"Επιλογή κατηγοριών":"Επιλογή ρημάτων"}</h2><p class="muted">Άφησε τα όλα κενά για όλες τις επιλογές.</p><div class="grid">${items.map(item=>`<label class="check"><input type="checkbox" value="${escapeHtml(item.key)}" ${selected.has(item.key)?"checked":""}><span>${escapeHtml(item.label)}</span></label>`).join("")}</div><div class="actions"><button class="secondary" id="selectAll">Καθαρισμός όλων</button></div>`;const persistSelection=()=>{const values=[...document.querySelectorAll("input[type='checkbox']:checked")].map(input=>input.value);saveConfig(isCategory?{categories:values}:{verbs:values})};document.querySelectorAll("input[type='checkbox']").forEach(input=>input.addEventListener("change",persistSelection));document.querySelector("#selectAll").addEventListener("click",()=>{document.querySelectorAll("input[type='checkbox']").forEach(input=>input.checked=false);persistSelection()})}function renderCount(){setActive("count");view.innerHTML=`<h2>Αριθμός ερωτήσεων</h2><div class="number-row"><input id="questionCount" type="number" min="1" step="1" value="${config.question_count}"></div>`;const input=document.querySelector("#questionCount");const persistCount=()=>{const value=Math.max(1,Number.parseInt(input.value,10)||DATA.default_question_count);saveConfig({question_count:value})};input.addEventListener("input",persistCount);input.addEventListener("change",persistCount)}function accuracy(correct,total){return total?`${((correct/total)*100).toFixed(1)}%`:"δ/υ"}function renderStats(){setActive("stats");const rows=loadAttempts();const correct=rows.reduce((sum,row)=>sum+(row.correct?1:0),0);if(!rows.length){view.innerHTML=`<h2>Στατιστικά</h2><div class="empty">Δεν υπάρχουν αποθηκευμένες προσπάθειες.</div>`;return}const byCategory=groupScores(rows,row=>row.category).map(row=>({...row,label:CATEGORY_LABELS[row.key]||row.key})).sort(scoreSort);const byVerb=groupScores(rows,row=>row.verb).map(row=>({...row,verb:row.key})).sort((a,b)=>scoreSort(a,b)||a.verb.localeCompare(b.verb,"el"));view.innerHTML=`<h2>Σύνολο</h2><p><strong>${correct}/${rows.length}</strong> (${accuracy(correct,rows.length)})</p><h3>Ανά κατηγορία</h3>${scoreTable(byCategory,"label")}<h3>Ανά ρήμα</h3>${scoreTable(byVerb,"verb")}<div class="actions"><button class="secondary" id="resetStats">Μηδενισμός στατιστικών</button></div>`;document.querySelector("#resetStats").addEventListener("click",()=>{if(confirm("Να διαγραφούν όλα τα αποθηκευμένα στατιστικά;")){localStorage.removeItem(STORAGE_ATTEMPTS);sessionScore.textContent="0/0";renderStats()}})}function groupScores(rows,keyFn){const map=new Map;for(const row of rows){const key=keyFn(row);if(!map.has(key))map.set(key,{key,total:0,correct:0});const score=map.get(key);score.total++;score.correct+=row.correct?1:0}return[...map.values()]}function scoreSort(a,b){return a.correct/a.total-b.correct/b.total||b.total-a.total}function scoreTable(rows,labelKey){return`<table><thead><tr><th>Όνομα</th><th class="right">Σκορ</th><th class="right">Ακρίβεια</th></tr></thead><tbody>${rows.map(row=>`<tr><td>${escapeHtml(row[labelKey])}</td><td class="right">${row.correct}/${row.total}</td><td class="right">${accuracy(row.correct,row.total)}</td></tr>`).join("")}</tbody></table>`}function renderProgress(){setActive("progress");const selected=new Set(config.categories);const rows=loadAttempts().filter(row=>!selected.size||selected.has(row.category));if(!rows.length){view.innerHTML=`<h2>Πρόοδος ανά ημέρα</h2><div class="empty">Δεν υπάρχουν προσπάθειες για τις επιλεγμένες κατηγορίες.</div>`;return}const periods=[...new Set(rows.map(row=>row.attempted_at.slice(0,10)))].sort().reverse().slice(0,30);const periodSet=new Set(periods);const scores=groupScores(rows.filter(row=>periodSet.has(row.attempted_at.slice(0,10))),row=>`${row.attempted_at.slice(0,10)}\u0001${row.category}`).map(row=>{const [period,category]=row.key.split("\u0001");return{...row,period,category,label:CATEGORY_LABELS[category]||category}}).sort((a,b)=>b.period.localeCompare(a.period)||a.label.localeCompare(b.label,"el"));view.innerHTML=`<h2>Πρόοδος ανά ημέρα</h2><p class="muted">Οι τελευταίες 30 περίοδοι με προσπάθειες.</p><table><thead><tr><th>Περίοδος</th><th>Κατηγορία</th><th class="right">Σκορ</th><th class="right">Ακρίβεια</th></tr></thead><tbody>${scores.map(row=>`<tr><td>${escapeHtml(row.period)}</td><td>${escapeHtml(row.label)}</td><td class="right">${row.correct}/${row.total}</td><td class="right">${accuracy(row.correct,row.total)}</td></tr>`).join("")}</tbody></table>`}function renderCatalog(){setActive("catalog");view.innerHTML=`<h2>${DATA.verbs.length} ρήματα, ${QUESTIONS.length} διαθέσιμες ερωτήσεις</h2><table><thead><tr><th>Ρήμα</th><th>Κατηγορίες</th></tr></thead><tbody>${DATA.verbs.map(verb=>{const cats=[...new Set(QUESTIONS.filter(q=>q.verb===verb).map(q=>q.category))].sort((a,b)=>CATEGORY_LABELS[a].localeCompare(CATEGORY_LABELS[b],"el"));return`<tr><td><strong>${escapeHtml(verb)}</strong></td><td><div class="pill-list">${cats.map(c=>`<span class="pill">${escapeHtml(CATEGORY_LABELS[c])}</span>`).join("")}</div></td></tr>`}).join("")}</tbody></table>`}function renderConjugations(){setActive("conjugations");const selected=availableQuestions();const selectedIds=new Set(selected.map(q=>q.id));const rows=DATA.verbs.map(verb=>({verb,questions:QUESTIONS.filter(q=>selectedIds.has(q.id)&&q.verb===verb)})).filter(row=>row.questions.length);view.innerHTML=`<h2>Κλίσεις επιλεγμένων ρημάτων</h2>${rows.length?rows.map(row=>`<div class="verb-block"><div class="verb-name">${escapeHtml(row.verb)}</div>${CATEGORIES.map(category=>{const forms=row.questions.filter(q=>q.category===category.key);return forms.length?`<h3>${escapeHtml(category.label)}</h3><table><tbody>${forms.sort(personSort).map(q=>`<tr><th>${escapeHtml(q.person_label)}</th><td>${escapeHtml(q.display)}</td></tr>`).join("")}</tbody></table>`:""}).join("")}</div>`).join(""):`<div class="empty">Δεν υπάρχουν κλίσεις για τα επιλεγμένα ρήματα/κατηγορίες.</div>`}`}function personSort(a,b){const order=["1s","2s","3s","1p","2p","3p"];return order.indexOf(a.person_key)-order.indexOf(b.person_key)}function renderExit(){setActive("exit");view.innerHTML=`<h2>Έξοδος</h2><p class="muted">Μπορείς να κλείσεις αυτή την καρτέλα.</p>`}menu.addEventListener("click",event=>{const button=event.target.closest("button");if(!button)return;const name=button.dataset.view;if(name==="quiz")startQuiz();if(name==="categories")renderSelection("categories");if(name==="verbs")renderSelection("verbs");if(name==="count")renderCount();if(name==="progress")renderProgress();if(name==="stats")renderStats();if(name==="catalog")renderCatalog();if(name==="conjugations")renderConjugations();if(name==="exit")renderExit()});updateSummary();renderHome();})().catch(error=>{
  const escape=value=>String(value).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'\"':"&quot;","'":"&#039;"})[c]);
  const target=document.querySelector("#view")||document.body;
  target.innerHTML=`<div class="empty">${escape(error.message||error)}</div>`;
});</script>
