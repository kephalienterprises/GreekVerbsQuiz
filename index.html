const TOOLTIP_LANGUAGE_STORAGE="GreekQuiz.tooltip_language";const TOOLTIP_TRANSLATIONS={"Εξάσκηση ρημάτων":{en:"Greek verb practice",es:"Práctica de verbos griegos"},"Έναρξη κουίζ":{en:"Start quiz",es:"Iniciar cuestionario"},"Ρυθμίσεις":{en:"Settings",es:"Configuración"},"Προβολή προόδου":{en:"View progress",es:"Ver progreso"},"Προβολή στατιστικών":{en:"View statistics",es:"Ver estadísticas"},"Λίστα ρημάτων και κατηγοριών":{en:"Verb and category list",es:"Lista de verbos y categorías"},"Προβολή κλίσεων επιλεγμένων ρημάτων":{en:"View conjugations for selected verbs",es:"Ver conjugaciones de los verbos seleccionados"},"Τρέχουσες επιλογές":{en:"Current settings",es:"Configuración actual"},"Ρυθμίσεις κουίζ":{en:"Quiz settings",es:"Configuración del cuestionario"},"Ερωτήσεις":{en:"Questions",es:"Preguntas"},"Λειτουργία":{en:"Mode",es:"Modo"},"Πολλαπλής επιλογής":{en:"Multiple choice",es:"Opción múltiple"},"Πληκτρολόγηση":{en:"Typing",es:"Escritura"},"Κατηγορίες":{en:"Categories",es:"Categorías"},"Ρήματα":{en:"Verbs",es:"Verbos"},"Καθαρισμός κατηγοριών":{en:"Clear categories",es:"Borrar categorías"},"Καθαρισμός ρημάτων":{en:"Clear verbs",es:"Borrar verbos"},"Ερώτηση":{en:"Question",es:"Pregunta"},"Ρήμα:":{en:"Verb:",es:"Verbo:"},"Κατηγορία:":{en:"Category:",es:"Categoría:"},"Πρόσωπο:":{en:"Person:",es:"Persona:"},"Σωστά.":{en:"Correct.",es:"Correcto."},"Επόμενη":{en:"Next",es:"Siguiente"},"Σκορ συνεδρίας":{en:"Session score",es:"Puntuación de la sesión"},"Νέο κουίζ":{en:"New quiz",es:"Nuevo cuestionario"},"Στατιστικά":{en:"Statistics",es:"Estadísticas"},"Πρόοδος ανά ημέρα":{en:"Progress by day",es:"Progreso por día"},"Σύνολο":{en:"Total",es:"Total"},"Όνομα":{en:"Name",es:"Nombre"},"Σκορ":{en:"Score",es:"Puntuación"},"Ακρίβεια":{en:"Accuracy",es:"Precisión"},"Ενεστώτας οριστικής":{en:"Present indicative",es:"Indicativo presente"},"Παρατατικός":{en:"Imperfect",es:"Imperfecto"},"Αόριστος οριστικής":{en:"Aorist indicative",es:"Aoristo indicativo"},"Μέλλοντας διαρκείας":{en:"Continuous future",es:"Futuro continuo"},"Στιγμιαίος μέλλοντας":{en:"Simple future",es:"Futuro simple"},"Υποθετικός διαρκείας":{en:"Continuous conditional",es:"Condicional continuo"},"Υποτακτική ενεστώτα":{en:"Present subjunctive",es:"Subjuntivo presente"},"Υποτακτική αορίστου":{en:"Aorist subjunctive",es:"Subjuntivo aoristo"},"Παρακείμενος":{en:"Present perfect",es:"Perfecto compuesto"},"Υπερσυντέλικος":{en:"Past perfect",es:"Pluscuamperfecto"},"Συντελεσμένος μέλλοντας":{en:"Future perfect",es:"Futuro perfecto"},"Προστακτική διαρκείας":{en:"Continuous imperative",es:"Imperativo continuo"},"Στιγμιαία προστακτική":{en:"Simple imperative",es:"Imperativo aoristo"}};
let tooltipLanguage=["en","es"].includes(localStorage.getItem(TOOLTIP_LANGUAGE_STORAGE))?localStorage.getItem(TOOLTIP_LANGUAGE_STORAGE):"en";tooltipLanguageSelect.value=tooltipLanguage;function refreshTooltips(){tooltipLanguageLabel.textContent=tooltipLanguage==="es"?"Ayudas emergentes":"Tooltips";document.querySelectorAll("button,label,h1,h2,h3,p,th,td,strong,span").forEach(element=>{const translation=TOOLTIP_TRANSLATIONS[element.textContent.trim()]?.[tooltipLanguage];if(translation)element.title=translation})}
let config=loadConfig();let quizRun=[];let quizIndex=0;let sessionCorrect=0;let answerLocked=false;const questionById=new Map(QUESTIONS.map(q=>[q.id,q]));const answerIndex=buildAnswerIndex();function escapeHtml(value){return String(value).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"})[c])}
function normalizeAnswer(value){return String(value).trim().toLocaleLowerCase("el-GR").split(/\s+/).filter(Boolean).join(" ").normalize("NFC")}
function categoryMatchAnswers(question){const answers=new Set(question.answers.map(normalizeAnswer));for(const answer of question.answers){const parts=normalizeAnswer(answer).split(" ").filter(Boolean);for(const particle of ["να","ας"]){if(parts[0]===particle)answers.add(parts.slice(1).join(" "));if(parts.length>=3&&parts[1]===particle)answers.add([parts[0],...parts.slice(2)].join(" "))}}return answers}
function buildAnswerIndex(){const index=new Map();for(const q of QUESTIONS){for(const answer of categoryMatchAnswers(q)){const key=`${q.verb}\u0001${q.person_key}\u0001${answer}`;if(!index.has(key))index.set(key,new Set);index.get(key).add(q.category)}}return index}
function matchingOtherCategories(question,answer){const key=`${question.verb}\u0001${question.person_key}\u0001${normalizeAnswer(answer)}`;return [...(answerIndex.get(key)||new Set)].filter(c=>c!==question.category).sort((a,b)=>CATEGORY_LABELS[a].localeCompare(CATEGORY_LABELS[b],"el"))}
function loadConfig(){try{const data=JSON.parse(localStorage.getItem(STORAGE_CONFIG)||"{}");return validateConfig(data)}catch{return validateConfig({})}}
function validateConfig(data){const allowedVerbs=new Set(DATA.verbs);const allowedCategories=new Set(CATEGORIES.map(c=>c.key));const count=Number.isInteger(data.question_count)&&data.question_count>=1?data.question_count:DATA.default_question_count;const verbs=Array.isArray(data.verbs)?data.verbs.filter(v=>allowedVerbs.has(v)):[];const categories=Array.isArray(data.categories)?data.categories.filter(c=>allowedCategories.has(c)):[];const multipleChoice=data.multiple_choice===true;return{question_count:count,multiple_choice:multipleChoice,verbs:[...new Set(verbs)].sort((a,b)=>a.localeCompare(b,"el")),categories:[...new Set(categories)].sort((a,b)=>CATEGORY_LABELS[a].localeCompare(CATEGORY_LABELS[b],"el"))}}
function saveConfig(next){config=validateConfig({...config,...next});localStorage.setItem(STORAGE_CONFIG,JSON.stringify(config));updateSummary()}
function loadAttempts(){try{const rows=JSON.parse(localStorage.getItem(STORAGE_ATTEMPTS)||"[]");return Array.isArray(rows)?rows:[]}catch{return[]}}
function saveAttempts(rows){localStorage.setItem(STORAGE_ATTEMPTS,JSON.stringify(rows))}
function recordAttempt(question,answer,correct){const rows=loadAttempts();rows.push({attempted_at:new Date().toISOString(),verb:question.verb,category:question.category,person_key:question.person_key,expected:question.answers[0],answer,correct:correct?1:0});saveAttempts(rows)}
function describeFilter(values,labels){if(!values.length)return"Όλα";return values.map(v=>labels?labels[v]||v:v).sort((a,b)=>a.localeCompare(b,"el")).join(", ")}
function modeLabel(){return config.multiple_choice?"Πολλαπλής επιλογής":"Πληκτρολόγηση"}
function updateSummary(){summary.textContent=`Ερωτήσεις: ${config.question_count} | Λειτουργία: ${modeLabel()} | Κατηγορίες: ${describeFilter(config.categories,CATEGORY_LABELS)} | Ρήματα: ${describeFilter(config.verbs)}`}
function setActive(name){document.querySelectorAll(".menu button").forEach(button=>button.classList.toggle("active",button.dataset.view===name))}
function availableQuestions(verbs=config.verbs,categories=config.categories){return QUESTIONS.filter(q=>(!verbs.length||verbs.includes(q.verb))&&(!categories.length||categories.includes(q.category)))}
function availableCategories(){return new Set(availableQuestions(config.verbs,[]).map(q=>q.category))}
function availableVerbs(){return new Set(availableQuestions([],config.categories).map(q=>q.verb))}
function shuffled(array){const copy=[...array];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}
function sample(array,count){const take=n=>shuffled(array).slice(0,n);if(count<=array.length)return take(count);const selected=[];let remaining=count;while(remaining>=array.length){selected.push(...take(array.length));remaining-=array.length}if(remaining)selected.push(...take(remaining));return selected}
function answerFrame(answer){const words=answer.trim().split(/\s+/);if(words[0]==="θα"&&words.length>2)return`${words.slice(0,-1).join(" ")} `;if(words.length>1&&["θα","να","έχω","έχεις","έχει","έχουμε","έχετε","έχουν","είχα","είχες","είχε","είχαμε","είχατε","είχαν"].includes(words[0]))return`${words.slice(0,-1).join(" ")} `;return""}
function answerTail(answer){return answer.slice(answerFrame(answer).length).trim()}
function syntheticTails(tails,personKey){const endings={"1s":["ω","α"],"2s":["εις","ες"],"3s":["ει","ε"],"1p":["ουμε","αμε","ομε","ομεν"],"2p":["ετε","ατε"],"3p":["ουν","αν"]}[personKey]||[];const variants=[];for(const tail of shuffled(tails)){const ending=endings.find(value=>tail.endsWith(value));if(!ending)continue;const stem=tail.slice(0,-ending.length);for(const alternative of endings){if(alternative!==ending)variants.push(`${stem}${alternative}`)}}return variants}
function irregularTails(tails){const variants=[];for(const tail of shuffled(tails)){if(tail.endsWith("ν"))variants.push(`${tail}α`);if(tail.endsWith("αι"))variants.push(`${tail}νε`);if(tail.endsWith("αν"))variants.push(`${tail}ε`);if(tail.endsWith("τε"))variants.push(`${tail}ν`);if(tail.endsWith("μαι"))variants.push(`${tail.slice(0,-1)}α`)}return variants}
function multipleChoiceOptions(question){const correct=question.answers[0];const frame=answerFrame(correct);const used=new Set([normalizeAnswer(correct)]);const options=[correct];const add=answer=>{const normalized=normalizeAnswer(answer);if(!used.has(normalized)){used.add(normalized);options.push(answer);return options.length===4}return false};const samePerson=QUESTIONS.filter(candidate=>candidate.verb===question.verb&&candidate.id!==question.id&&candidate.person_key===question.person_key);for(const candidate of shuffled(samePerson.filter(candidate=>answerFrame(candidate.answers[0])===frame))){if(add(candidate.answers[0]))return shuffled(options)}const tails=samePerson.map(candidate=>answerTail(candidate.answers[0]));for(const tail of shuffled(tails)){if(add(`${frame}${tail}`))return shuffled(options)}for(const tail of syntheticTails(tails,question.person_key)){if(add(`${frame}${tail}`))return shuffled(options)}for(const tail of irregularTails(tails)){if(add(`${frame}${tail}`))return shuffled(options)}return shuffled(options)}
function renderHome(){setActive("");view.innerHTML=`<h2>Τρέχουσες επιλογές</h2><table><tbody><tr><th>Ερωτήσεις</th><td>${config.question_count}</td></tr><tr><th>Λειτουργία</th><td>${modeLabel()}</td></tr><tr><th>Κατηγορίες</th><td>${escapeHtml(describeFilter(config.categories,CATEGORY_LABELS))}</td></tr><tr><th>Ρήματα</th><td>${escapeHtml(describeFilter(config.verbs))}</td></tr></tbody></table>`}
function startQuiz(){setActive("quiz");const filtered=availableQuestions();if(!filtered.length){view.innerHTML=`<div class="empty">Δεν υπάρχουν ερωτήσεις για τα επιλεγμένα ρήματα/κατηγορίες.</div>`;return}quizRun=sample(filtered,config.question_count);quizIndex=0;sessionCorrect=0;
renderQuestion()}
function renderQuestion(){answerLocked=false;const question=quizRun[quizIndex];const prompt=`<h2>Ερώτηση ${quizIndex+1}/${quizRun.length}</h2><div class="question-meta"><div><strong>Ρήμα:</strong> ${escapeHtml(question.verb)}</div><div><strong>Κατηγορία:</strong> ${escapeHtml(CATEGORY_LABELS[question.category])}</div><div><strong>Πρόσωπο:</strong> ${escapeHtml(question.pronoun)} <span class="muted">(${escapeHtml(question.person_label)})</span></div></div>`;
if(config.multiple_choice){const options=multipleChoiceOptions(question);view.innerHTML=`${prompt}<div id="choiceOptions" class="choice-grid">${options.map((option,index)=>`<button class="choice-option" type="button" data-answer="${escapeHtml(option)}" aria-keyshortcuts="Numpad${index+1}"><span class="choice-key" aria-hidden="true">${index+1}</span><span>${escapeHtml(option)}</span></button>`).join("")}</div><div id="feedback" class="feedback"></div>`;document.querySelector("#choiceOptions").addEventListener("click",submitChoiceAnswer);return}view.innerHTML=`${prompt}<form id="answerForm"><div class="answer-row"><input id="answer" autocomplete="off" autofocus placeholder="Η απάντησή σου"><button class="primary" type="submit">Έλεγχος</button></div></form><div id="feedback" class="feedback"></div>`;document.querySelector("#answer").focus();document.querySelector("#answerForm").addEventListener("submit",submitAnswer)}
function finishAnswer(answer){if(answerLocked)return null;answerLocked=true;const question=quizRun[quizIndex];const accepted=new Set(question.answers.map(normalizeAnswer));const correct=accepted.has(normalizeAnswer(answer));recordAttempt(question,answer,correct);if(correct)sessionCorrect++;
const feedback=document.querySelector("#feedback");const expected=question.answers.map(escapeHtml).join(" / ");const other=matchingOtherCategories(question,answer);const matched=other.length?`<p class="muted">Η απάντησή σου ταιριάζει με: ${other.map(c=>escapeHtml(CATEGORY_LABELS[c])).join(", ")}.</p>`:"";feedback.className=`feedback ${correct?"good":"bad"}`;feedback.innerHTML=correct?"Σωστά.":`Όχι ακριβώς. <span class="muted">Αναμενόμενο:</span> ${expected}${matched}`;const actions=document.createElement("div");actions.className="actions";actions.innerHTML=quizIndex+1<quizRun.length?`<button class="primary">Επόμενη</button>`:`<button class="primary">Σκορ συνεδρίας</button>`;view.append(actions);const button=actions.querySelector("button");button.focus();button.addEventListener("click",()=>{if(quizIndex+1<quizRun.length){quizIndex++;renderQuestion()}else renderQuizDone()});return{correct,accepted}}
function submitAnswer(event){event.preventDefault();const input=document.querySelector("#answer");const result=finishAnswer(input.value);if(!result)return;input.disabled=true;document.querySelector("#answerForm button").disabled=true}
function submitChoiceAnswer(event){const button=event.target.closest(".choice-option");if(!button)return;const result=finishAnswer(button.dataset.answer);if(!result)return;document.querySelectorAll(".choice-option").forEach(option=>{const isCorrect=result.accepted.has(normalizeAnswer(option.dataset.answer));option.disabled=true;option.classList.toggle("correct-choice",isCorrect);option.classList.toggle("wrong-choice",option===button&&!isCorrect)})}
function renderQuizDone(){const percent=quizRun.length?((sessionCorrect/quizRun.length)*100).toFixed(1):"0.0";view.innerHTML=`<h2>Σκορ συνεδρίας</h2><p class="score">${sessionCorrect}/${quizRun.length} (${percent}%)</p><div class="actions"><button class="primary" id="again">Νέο κουίζ</button><button class="secondary" id="statsButton">Στατιστικά</button></div>`;document.querySelector("#again").addEventListener("click",startQuiz);document.querySelector("#statsButton").addEventListener("click",renderStats)}
function renderSettings(){setActive("settings");const categorySelection=new Set(config.categories);const verbSelection=new Set(config.verbs);view.innerHTML=`<h2>Ρυθμίσεις κουίζ</h2><div class="settings-controls"><label class="count-control" for="settingsQuestionCount"><span>Ερωτήσεις</span><input id="settingsQuestionCount" type="number" min="1" step="1" value="${config.question_count}"></label><label class="switch-control" for="settingsMultipleChoice"><span>Πολλαπλής επιλογής</span><input id="settingsMultipleChoice" type="checkbox" ${config.multiple_choice?"checked":""}><span class="switch" aria-hidden="true"><span></span></span></label></div><h3>Κατηγορίες</h3><p class="muted">Άφησε τα όλα κενά για όλες τις επιλογές.</p><div class="grid">${CATEGORIES.map(category=>`<label class="check"><input data-setting="categories" type="checkbox" value="${escapeHtml(category.key)}" ${categorySelection.has(category.key)?"checked":""}><span>${escapeHtml(category.label)}</span></label>`).join("")}</div><div class="actions"><button class="secondary" type="button" data-clear="categories">Καθαρισμός κατηγοριών</button></div><h3>Ρήματα</h3><p class="muted">Άφησε τα όλα κενά για όλες τις επιλογές.</p><div class="grid">${DATA.verbs.map(verb=>`<label class="check"><input data-setting="verbs" type="checkbox" value="${escapeHtml(verb)}" ${verbSelection.has(verb)?"checked":""}><span>${escapeHtml(verb)}</span></label>`).join("")}</div><div class="actions"><button class="secondary" type="button" data-clear="verbs">Καθαρισμός ρημάτων</button></div>`;const persistSelection=setting=>{const values=[...document.querySelectorAll(`input[data-setting="${setting}"]:checked`)].map(input=>input.value);saveConfig({[setting]:values})};document.querySelectorAll("input[data-setting]").forEach(input=>input.addEventListener("change",()=>persistSelection(input.dataset.setting)));document.querySelectorAll("[data-clear]").forEach(button=>button.addEventListener("click",()=>{const setting=button.dataset.clear;document.querySelectorAll(`input[data-setting="${setting}"]`).forEach(input=>input.checked=false);persistSelection(setting)}));const count=document.querySelector("#settingsQuestionCount");count.addEventListener("input",()=>{const value=Number.parseInt(count.value,10);if(Number.isInteger(value)&&value>=1)saveConfig({question_count:value})});count.addEventListener("change",()=>{const value=Number.parseInt(count.value,10);if(Number.isInteger(value)&&value>=1)saveConfig({question_count:value});else count.value=config.question_count});document.querySelector("#settingsMultipleChoice").addEventListener("change",event=>saveConfig({multiple_choice:event.target.checked}))}
function accuracy(correct,total){return total?`${((correct/total)*100).toFixed(1)}%`:"δ/υ"}
function renderStats(){setActive("stats");const rows=loadAttempts();const correct=rows.reduce((sum,row)=>sum+(row.correct?1:0),0);if(!rows.length){view.innerHTML=`<h2>Στατιστικά</h2><div class="empty">Δεν υπάρχουν αποθηκευμένες προσπάθειες.</div>`;return}const byCategory=groupScores(rows,row=>row.category).map(row=>({...row,label:CATEGORY_LABELS[row.key]||row.key})).sort(scoreSort);const byVerb=groupScores(rows,row=>row.verb).map(row=>({...row,verb:row.key})).sort((a,b)=>scoreSort(a,b)||a.verb.localeCompare(b.verb,"el"));view.innerHTML=`<h2>Σύνολο</h2><p><strong>${correct}/${rows.length}</strong> (${accuracy(correct,rows.length)})</p><h3>Ανά κατηγορία</h3>${scoreTable(byCategory,"label")}<h3>Ανά ρήμα</h3>${scoreTable(byVerb,"verb")}<div class="actions"><button class="secondary" id="resetStats">Μηδενισμός στατιστικών</button></div>`;document.querySelector("#resetStats").addEventListener("click",()=>{if(confirm("Να διαγραφούν όλα τα αποθηκευμένα στατιστικά;")){localStorage.removeItem(STORAGE_ATTEMPTS);
renderStats()}})}
function groupScores(rows,keyFn){const map=new Map;for(const row of rows){const key=keyFn(row);if(!map.has(key))map.set(key,{key,total:0,correct:0});const score=map.get(key);score.total++;score.correct+=row.correct?1:0}return[...map.values()]}
function scoreSort(a,b){return a.correct/a.total-b.correct/b.total||b.total-a.total}
function scoreTable(rows,labelKey){return`<table><thead><tr><th>Όνομα</th><th class="right">Σκορ</th><th class="right">Ακρίβεια</th></tr></thead><tbody>${rows.map(row=>`<tr><td>${escapeHtml(row[labelKey])}</td><td class="right">${row.correct}/${row.total}</td><td class="right">${accuracy(row.correct,row.total)}</td></tr>`).join("")}</tbody></table>`}
function renderProgress(){setActive("progress");const selected=new Set(config.categories);const rows=loadAttempts().filter(row=>!selected.size||selected.has(row.category));if(!rows.length){view.innerHTML=`<h2>Πρόοδος ανά ημέρα</h2><div class="empty">Δεν υπάρχουν προσπάθειες για τις επιλεγμένες κατηγορίες.</div>`;return}const periods=[...new Set(rows.map(row=>row.attempted_at.slice(0,10)))].sort().reverse().slice(0,30);const periodSet=new Set(periods);const scores=groupScores(rows.filter(row=>periodSet.has(row.attempted_at.slice(0,10))),row=>`${row.attempted_at.slice(0,10)}\u0001${row.category}`).map(row=>{const [period,category]=row.key.split("\u0001");return{...row,period,category,label:CATEGORY_LABELS[category]||category}}).sort((a,b)=>b.period.localeCompare(a.period)||a.label.localeCompare(b.label,"el"));view.innerHTML=`<h2>Πρόοδος ανά ημέρα</h2><p class="muted">Οι τελευταίες 30 περίοδοι με προσπάθειες.</p><table><thead><tr><th>Περίοδος</th><th>Κατηγορία</th><th class="right">Σκορ</th><th class="right">Ακρίβεια</th></tr></thead><tbody>${scores.map(row=>`<tr><td>${escapeHtml(row.period)}</td><td>${escapeHtml(row.label)}</td><td class="right">${row.correct}/${row.total}</td><td class="right">${accuracy(row.correct,row.total)}</td></tr>`).join("")}</tbody></table>`}
function renderCatalog(){setActive("catalog");view.innerHTML=`<h2>${DATA.verbs.length} ρήματα, ${QUESTIONS.length} διαθέσιμες ερωτήσεις</h2><table><thead><tr><th>Ρήμα</th><th>Κατηγορίες</th></tr></thead><tbody>${DATA.verbs.map(verb=>{const cats=[...new Set(QUESTIONS.filter(q=>q.verb===verb).map(q=>q.category))].sort((a,b)=>CATEGORY_LABELS[a].localeCompare(CATEGORY_LABELS[b],"el"));return`<tr><td><strong>${escapeHtml(verb)}</strong></td><td><div class="pill-list">${cats.map(c=>`<span class="pill">${escapeHtml(CATEGORY_LABELS[c])}</span>`).join("")}</div></td></tr>`}).join("")}</tbody></table>`}
function renderConjugations(){setActive("conjugations");const selected=availableQuestions();const selectedIds=new Set(selected.map(q=>q.id));const rows=DATA.verbs.map(verb=>({verb,questions:QUESTIONS.filter(q=>selectedIds.has(q.id)&&q.verb===verb)})).filter(row=>row.questions.length);view.innerHTML=`<h2>Κλίσεις επιλεγμένων ρημάτων</h2>${rows.length?rows.map(row=>`<div class="verb-block"><div class="verb-name">${escapeHtml(row.verb)}</div>${CATEGORIES.map(category=>{const forms=row.questions.filter(q=>q.category===category.key);return forms.length?`<h3>${escapeHtml(category.label)}</h3><table><tbody>${forms.sort(personSort).map(q=>`<tr><th>${escapeHtml(q.person_label)}</th><td>${escapeHtml(q.display)}</td></tr>`).join("")}</tbody></table>`:""}).join("")}</div>`).join(""):`<div class="empty">Δεν υπάρχουν κλίσεις για τα επιλεγμένα ρήματα/κατηγορίες.</div>`}`}
function personSort(a,b){const order=["1s","2s","3s","1p","2p","3p"];return order.indexOf(a.person_key)-order.indexOf(b.person_key)}
function selectChoiceByNumpad(event){const match=/^(?:Numpad|Digit)([1-4])$/.exec(event.code);if(!match||answerLocked||!config.multiple_choice)return;const choice=[...document.querySelectorAll(".choice-option")][Number(match[1])-1];if(!choice||choice.disabled)return;event.preventDefault();choice.click()}
menu.addEventListener("click",event=>{const button=event.target.closest("button");if(!button)return;const name=button.dataset.view;if(name==="quiz")startQuiz();if(name==="settings")renderSettings();if(name==="progress")renderProgress();if(name==="stats")renderStats();if(name==="catalog")renderCatalog();if(name==="conjugations")renderConjugations();});tooltipLanguageSelect.addEventListener("change",event=>{tooltipLanguage=event.target.value;localStorage.setItem(TOOLTIP_LANGUAGE_STORAGE,tooltipLanguage);refreshTooltips()});const tooltipObserver=new MutationObserver(()=>refreshTooltips());tooltipObserver.observe(view,{childList:true,subtree:true});updateSummary();renderHome();refreshTooltips();
document.addEventListener("keydown",selectChoiceByNumpad);
</script>
